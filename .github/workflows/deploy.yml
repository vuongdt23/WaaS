name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run build

      - name: Smoke check
        run: |
          test -f dist/api/facts.json
          test -f dist/api/index.json
          test -f dist/index.html
          node -e "
            const f = JSON.parse(require('fs').readFileSync('dist/api/facts.json','utf8'));
            const i = JSON.parse(require('fs').readFileSync('dist/api/index.json','utf8'));
            if (!Array.isArray(f) || f.length < 1) { console.error('No facts'); process.exit(1); }
            if (!i.total_facts || !i.total_species) { console.error('Bad index'); process.exit(1); }
            console.log('Smoke check passed:', i.total_facts, 'facts,', i.total_species, 'species');
          "

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
