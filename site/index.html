<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Whale as a Service — a static JSON API of whale facts</title>
  <meta name="description" content="A static JSON API of hand-curated whale facts. No keys, no rate limits." />
  <meta property="og:title" content="Whale as a Service" />
  <meta property="og:description" content="A static JSON API of hand-curated whale facts." />
  <link rel="stylesheet" href="./styles.css" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ctext x='4' y='52' font-size='52'%3E%F0%9F%AB%8D%3C/text%3E%3C/svg%3E" />
</head>
<body>
  <header class="topbar">
    <a class="brand" href="./">
      <span class="brand-mark" aria-hidden="true">🫍</span>
      <span class="brand-text">Whale as a Service</span>
    </a>
    <nav class="topnav">
      <a href="https://github.com/vuongdt23/WaaS" id="repo-link" rel="noopener">GitHub</a>
    </nav>
  </header>

  <main>
    <section class="hero">
      <div class="hero-mark" aria-hidden="true">🫍</div>
      <h1 class="hero-title">Whale as a Service</h1>
      <p class="hero-tagline">A static JSON API. <span id="fact-count">50</span> hand-curated whale facts. No keys, no limits.</p>
      <button type="button" class="curl-pill" data-copy="curl https://example.com/api/random.json">
        <span class="curl-prompt">$</span>
        <code id="curl-text">curl https://example.com/api/random.json</code>
        <span class="curl-hint">click to copy</span>
      </button>
    </section>

    <section class="featured" aria-labelledby="featured-label">
      <article class="fact-card" id="fact-card" aria-live="polite">
        <header class="fact-card-head">
          <span id="featured-label" class="fact-label">Today's fact</span>
          <button type="button" id="reroll" class="reroll" aria-label="Show another fact">↻</button>
        </header>
        <p class="fact-text" id="fact-text">Loading a whale fact…</p>
        <footer class="fact-meta" id="fact-meta"></footer>
      </article>
    </section>

    <section id="docs" class="endpoints">
      <h2 class="endpoints-heading">Endpoints</h2>
      <ul class="endpoint-list" id="endpoint-list">
        <li class="ep" data-path="/api/facts.json">
          <button type="button" class="ep-head" aria-expanded="false">
            <span class="ep-path">GET /api/facts.json</span>
            <span class="ep-desc">all facts</span>
            <span class="ep-chevron" aria-hidden="true">▸</span>
          </button>
          <div class="ep-body" hidden></div>
        </li>
        <li class="ep" data-path="/api/facts/{id}.json">
          <button type="button" class="ep-head" aria-expanded="false">
            <span class="ep-path">GET /api/facts/{id}.json</span>
            <span class="ep-desc">one fact</span>
            <span class="ep-chevron" aria-hidden="true">▸</span>
          </button>
          <div class="ep-body" hidden></div>
        </li>
        <li class="ep" data-path="/api/random.json">
          <button type="button" class="ep-head" aria-expanded="false">
            <span class="ep-path">GET /api/random.json</span>
            <span class="ep-desc">random (rotates per deploy)</span>
            <span class="ep-chevron" aria-hidden="true">▸</span>
          </button>
          <div class="ep-body" hidden></div>
        </li>
        <li class="ep" data-path="/api/fact-of-the-day/{MM-DD}.json">
          <button type="button" class="ep-head" aria-expanded="false">
            <span class="ep-path">GET /api/fact-of-the-day/{MM-DD}.json</span>
            <span class="ep-desc">deterministic by date</span>
            <span class="ep-chevron" aria-hidden="true">▸</span>
          </button>
          <div class="ep-body" hidden></div>
        </li>
        <li class="ep" data-path="/api/species.json">
          <button type="button" class="ep-head" aria-expanded="false">
            <span class="ep-path">GET /api/species.json</span>
            <span class="ep-desc">species index</span>
            <span class="ep-chevron" aria-hidden="true">▸</span>
          </button>
          <div class="ep-body" hidden></div>
        </li>
        <li class="ep" data-path="/api/species/{slug}.json">
          <button type="button" class="ep-head" aria-expanded="false">
            <span class="ep-path">GET /api/species/{slug}.json</span>
            <span class="ep-desc">species + its facts</span>
            <span class="ep-chevron" aria-hidden="true">▸</span>
          </button>
          <div class="ep-body" hidden></div>
        </li>
        <li class="ep" data-path="/api/categories.json">
          <button type="button" class="ep-head" aria-expanded="false">
            <span class="ep-path">GET /api/categories.json</span>
            <span class="ep-desc">category list</span>
            <span class="ep-chevron" aria-hidden="true">▸</span>
          </button>
          <div class="ep-body" hidden></div>
        </li>
        <li class="ep" data-path="/api/index.json">
          <button type="button" class="ep-head" aria-expanded="false">
            <span class="ep-path">GET /api/index.json</span>
            <span class="ep-desc">meta</span>
            <span class="ep-chevron" aria-hidden="true">▸</span>
          </button>
          <div class="ep-body" hidden></div>
        </li>
      </ul>
    </section>

    <footer class="page-foot">
      <p>Code: MIT. Data: <a href="https://creativecommons.org/licenses/by/4.0/">CC-BY-4.0</a>. Built with Node + GitHub Pages.</p>
    </footer>
  </main>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>
  <script type="module" src="./main.js"></script>
</body>
</html>
