- id: baiji-functionally-extinct
  text: >
    A 2006 expedition along roughly 3,500 km of China's Yangtze River failed to
    find a single baiji, leading scientists to declare the species functionally
    extinct in 2007.
  category: history
  source: https://en.wikipedia.org/wiki/Baiji
- id: baiji-first-cetacean-lost
  text: >
    The baiji is widely regarded as the first cetacean species driven to
    extinction in recorded history primarily through human activity rather than
    natural causes.
  category: history
  source: https://www.nationalgeographic.com/animals/article/baiji-extinct-river-dolphin-china-sighting-conservation
- id: baiji-goddess-of-the-yangtze
  text: >
    In Chinese culture the baiji was affectionately known as the "Goddess of the
    Yangtze," reflecting its iconic, almost mythological status along the river
    for centuries.
  category: trivia
  source: https://en.wikipedia.org/wiki/Baiji
- id: baiji-ancient-lineage
  text: >
    The baiji represents an ancient evolutionary lineage, with its family
    Lipotidae often described as having diverged from other cetaceans roughly
    20 million years ago.
  category: trivia
  source: https://en.wikipedia.org/wiki/Lipotidae
- id: baiji-sole-lipotidae
  text: >
    Lipotes vexillifer was the sole recent member of the family Lipotidae,
    making its disappearance the loss of an entire mammalian family-level
    lineage, not just a single species.
  category: trivia
  source: https://en.wikipedia.org/wiki/Lipotidae
- id: baiji-three-gorges-dam
  text: >
    Major river-engineering projects on the Yangtze, including the Three Gorges
    Dam, fragmented baiji habitat and altered the hydrology the dolphins relied
    on for feeding and migration.
  category: habitat
  source: https://www.nationalgeographic.com/animals/article/baiji-extinct-river-dolphin-china-sighting-conservation
- id: baiji-shipping-collisions
  text: >
    Heavy shipping traffic on the Yangtze caused frequent boat strikes and
    underwater noise pollution that interfered with the baiji's echolocation
    and contributed to its decline.
  category: habitat
  source: https://www.nationalgeographic.com/animals/article/baiji-extinct-river-dolphin-china-sighting-conservation
- id: baiji-electrofishing
  text: >
    Illegal fishing methods such as electrofishing, rolling hooks, and gillnets
    were among the most damaging direct human threats, killing baiji as
    bycatch throughout the 20th century.
  category: history
  source: https://en.wikipedia.org/wiki/Baiji
- id: baiji-pollution
  text: >
    Industrial and agricultural pollution along the Yangtze degraded water
    quality and depleted fish stocks, undermining the baiji's prey base in the
    decades before its extinction.
  category: habitat
  source: https://www.nationalgeographic.com/animals/article/baiji-extinct-river-dolphin-china-sighting-conservation
- id: baiji-near-blind-echolocation
  text: >
    Living in the murky, sediment-laden waters of the Yangtze, the baiji had
    very small, nearly useless eyes and relied heavily on echolocation to
    navigate and locate prey.
  category: communication
  source: https://www.nationalgeographic.com/animals/article/baiji-extinct-river-dolphin-china-sighting-conservation
- id: baiji-fish-diet
  text: >
    The baiji was a piscivore, feeding on a wide variety of small freshwater
    fish that it captured using echolocation in the turbid currents of the
    Yangtze River system.
  category: diet
  source: https://en.wikipedia.org/wiki/Baiji
- id: baiji-appearance
  text: >
    Adult baiji had a pale bluish-gray back, white underside, a low triangular
    dorsal fin, and a distinctive long, narrow, slightly upturned beak adapted
    for probing river-bottom prey.
  category: anatomy
  source: https://en.wikipedia.org/wiki/Baiji
- id: baiji-size
  text: >
    Baiji typically reached about 2 to 2.5 meters in length and weighed roughly
    125 to 230 kilograms, with females generally larger than males, a common
    pattern among river dolphins.
  category: anatomy
  source: https://en.wikipedia.org/wiki/Baiji
- id: baiji-reproduction
  text: >
    Reproduction in the baiji was poorly documented, but available records
    suggest a gestation of roughly 10 to 11 months and the birth of a single
    calf, with calving thought to peak in spring.
  category: reproduction
  source: https://en.wikipedia.org/wiki/Baiji
